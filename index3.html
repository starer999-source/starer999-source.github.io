<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文字轉換工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15);
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .card-header h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .card-header .material-icons {
            font-size: 28px;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        .input-group input {
            height: 60px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0 20px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-group input::placeholder {
            color: #9e9e9e;
        }
        
        .sd-output {
            margin-bottom: 24px;
            display: none;
        }
        
        .sd-output.show {
            display: block;
        }
        
        .sd-output label {
            font-size: 14px;
            font-weight: 500;
            color: #616161;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sd-display {
            height: 60px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 0 20px;
            font-size: 16px;
            color: #333;
            display: flex;
            align-items: center;
            background: white;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .btn {
            flex: 1;
            height: 44px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #424242;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        
        .output-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .output-box {
            display: flex;
            flex-direction: column;
        }
        
        .output-box label {
            font-size: 14px;
            font-weight: 500;
            color: #616161;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .output-box textarea {
            height: 500px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            padding: 16px;
            font-size: 14px;
            font-family: 'Roboto', monospace;
            resize: none;
            transition: all 0.3s ease;
            line-height: 1.6;
        }
        
        .output-box textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .output-box .copy-btn {
            margin-top: 12px;
            align-self: flex-end;
            padding: 8px 20px;
            font-size: 14px;
            height: auto;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        
        .float-buttons {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }
        
        .float-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .float-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .float-btn:active {
            transform: scale(0.95);
        }
        
        .float-btn-delete {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        
        .float-btn-delete:hover {
            box-shadow: 0 6px 20px rgba(235, 51, 73, 0.5);
        }
        
        .float-btn .material-icons {
            font-size: 20px;
        }
        
        @media (pointer: coarse) {
            .float-buttons {
                display: flex;
            }
        }
        
        @media (pointer: fine) {
            .float-buttons {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .output-section {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .card-body {
                padding: 20px;
            }
            
            .toast {
                left: 20px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8">
                <div class="card">
                    <div class="card-header">
                        <h1>
                            <span class="material-icons">text_transform</span>
                            文字轉換工具
                        </h1>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="inputText" class="form-control" placeholder="在此輸入或貼上您要轉換的文字..." readonly>
                        </div>
                        
                        <div class="sd-output">
                            <label>
                                <span class="material-icons">compare</span>
                                相鄰字符比較（S=相同, D=不同）
                            </label>
                            <div class="sd-display" id="sdResult"></div>
                        </div>
                        
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="convert()">
                                <span class="material-icons">swap_horiz</span>
                                轉換
                            </button>
                            <button class="btn btn-secondary" onclick="clearAll()">
                                <span class="material-icons">clear</span>
                                清空
                            </button>
                            <button class="btn btn-secondary" id="toggleSdBtn" onclick="toggleSd()">
                                <span class="material-icons">visibility</span>
                                顯示S/D
                            </button>
                            <button class="btn btn-secondary" id="toggleInputBtn" onclick="toggleInput()">
                                <span class="material-icons">lock</span>
                                禁止輸入
                            </button>
                        </div>
                        
                        <div class="output-section">
                            <div class="output-box">
                                <label>
                                    <span class="material-icons">format_list_bulleted</span>
                                    B/P 分行結果
                                </label>
                                <textarea id="outputLeft" readonly></textarea>
                                <button class="btn btn-secondary copy-btn" onclick="copyToClipboard('left')">
                                    <span class="material-icons">content_copy</span>
                                    複製
                                </button>
                            </div>
                            
                            <div class="output-box">
                                <label>
                                    <span class="material-icons">compare</span>
                                    S/D 分行結果
                                </label>
                                <textarea id="outputRight" readonly></textarea>
                                <button class="btn btn-secondary copy-btn" onclick="copyToClipboard('right')">
                                    <span class="material-icons">content_copy</span>
                                    複製
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <div class="float-buttons">
        <button class="float-btn float-btn-delete" onclick="deleteLastChar()">
            <span class="material-icons">backspace</span>
        </button>
        <button class="float-btn" onclick="addChar('B')">B</button>
        <button class="float-btn" onclick="addChar('P')">P</button>
    </div>
    
    <script>
        function addChar(char) {
            const input = document.getElementById('inputText');
            input.readOnly = false;
            input.value += char;
            input.readOnly = true;
            convert();
        }
        
        function deleteLastChar() {
            const input = document.getElementById('inputText');
            if (input.value.length > 0) {
                input.readOnly = false;
                input.value = input.value.slice(0, -1);
                input.readOnly = true;
                convert();
            }
        }
        
        function convert() {
            const input = document.getElementById('inputText').value;
            
            if (!input.trim()) {
                showToast('請輸入要轉換的文字', 'error');
                return;
            }
            
            const leftResult = convertLeft(input);
            const rightResult = convertRight(input);
            const sdResult = convertSD(input);
            
            document.getElementById('outputLeft').value = leftResult;
            document.getElementById('outputRight').value = rightResult;
            document.getElementById('sdResult').textContent = sdResult;
            
            showToast('轉換成功', 'success');
        }
        
        function convertSD(input) {
            const chars = [];
            for (let char of input) {
                const upperChar = char.toUpperCase();
                if (upperChar === 'B' || upperChar === 'P') {
                    chars.push(upperChar);
                }
            }
            
            if (chars.length < 2) {
                return '-';
            }
            
            let result = '';
            for (let i = 0; i < chars.length - 1; i++) {
                if (chars[i] === chars[i + 1]) {
                    result += 'S';
                } else {
                    result += 'D';
                }
            }
            
            return result;
        }
        
        function convertLeft(input) {
            const result = [];
            let currentChar = '';
            let currentGroup = '';
            
            for (let char of input) {
                const upperChar = char.toUpperCase();
                if (upperChar === 'B' || upperChar === 'P') {
                    if (upperChar !== currentChar) {
                        if (currentGroup) {
                            result.push(currentGroup);
                        }
                        currentChar = upperChar;
                        currentGroup = upperChar;
                    } else {
                        currentGroup += upperChar;
                    }
                }
            }
            
            if (currentGroup) {
                result.push(currentGroup);
            }
            
            return result.join('\n');
        }
        
        function convertRight(input) {
            const chars = [];
            for (let char of input) {
                const upperChar = char.toUpperCase();
                if (upperChar === 'B' || upperChar === 'P') {
                    chars.push(upperChar);
                }
            }
            
            if (chars.length < 2) {
                return '-';
            }
            
            let result = [];
            let currentChar = '';
            let currentGroup = '';
            
            for (let i = 0; i < chars.length - 1; i++) {
                const sd = chars[i] === chars[i + 1] ? 'S' : 'D';
                if (sd !== currentChar) {
                    if (currentGroup) {
                        result.push(currentGroup);
                    }
                    currentChar = sd;
                    currentGroup = sd;
                } else {
                    currentGroup += sd;
                }
            }
            
            if (currentGroup) {
                result.push(currentGroup);
            }
            
            return result.join('\n');
        }
        
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputLeft').value = '';
            document.getElementById('outputRight').value = '';
            document.getElementById('sdResult').textContent = '';
            showToast('已清空', 'success');
        }
        
        function toggleSd() {
            const sdOutput = document.querySelector('.sd-output');
            const btn = document.getElementById('toggleSdBtn');
            
            sdOutput.classList.toggle('show');
            
            if (sdOutput.classList.contains('show')) {
                btn.innerHTML = '<span class="material-icons">visibility_off</span>隱藏S/D';
            } else {
                btn.innerHTML = '<span class="material-icons">visibility</span>顯示S/D';
            }
        }
        
        function toggleInput() {
            const input = document.getElementById('inputText');
            const btn = document.getElementById('toggleInputBtn');
            
            input.readOnly = !input.readOnly;
            
            if (input.readOnly) {
                btn.innerHTML = '<span class="material-icons">lock</span>禁止輸入';
            } else {
                btn.innerHTML = '<span class="material-icons">lock_open</span>允許輸入';
            }
        }
        
        async function copyToClipboard(side) {
            const element = side === 'left' ? document.getElementById('outputLeft') : document.getElementById('outputRight');
            const text = element.value;
            
            if (!text.trim()) {
                showToast('沒有可複製的內容', 'error');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(text);
                showToast('已複製到剪貼板', 'success');
            } catch (err) {
                showToast('複製失敗', 'error');
            }
        }
        
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        document.getElementById('inputText').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                convert();
            }
        });
    </script>
</body>
</html>
