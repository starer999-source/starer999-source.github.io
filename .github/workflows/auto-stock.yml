name: 每日股票自动推送
on:
  schedule:
    - cron: "30 8 * * *"  # 北京时间16:30自动运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          pip install akshare requests pandas openpyxl

      - name: 运行股票脚本
        run: python stock_close.py
