<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>數值記錄計算中心</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --text: #1e293b;
      --text-muted: #64748b;
      --result: #0d9488;
      --border: #e2e8f0;
      --error: #dc2626;
      --history-bg: #f8fafc;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 12px rgba(15, 23, 42, 0.06);
      --radius: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 1.5rem;
      color: var(--primary);
      letter-spacing: 0.02em;
    }

    .section {
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .input-grid {
      display: grid;
      gap: 0.75rem;
    }

    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }

    .field input[type="number"],
    .field input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .field input.invalid {
      border-color: var(--error);
    }

    .results-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-label {
      font-size: 0.875rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .result-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--result);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .btn-save {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 1.25rem;
    }

    .btn-save:hover {
      background: var(--primary-hover);
    }

    .btn-save:active {
      transform: scale(0.98);
    }

    .history-panel {
      min-height: 120px;
      background: var(--history-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: pre-line;
      line-height: 1.65;
    }

    .history-panel.has-record {
      color: var(--text);
    }

    .history-panel .history-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .message {
      font-size: 0.8125rem;
      color: var(--error);
      min-height: 1.25rem;
      margin-top: 0.35rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 2rem;
      transform: translateX(-50%) translateY(120%);
      background: #334155;
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (min-width: 480px) {
      h1 {
        font-size: 1.75rem;
      }

      .input-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>數值記錄計算中心</h1>

    <section class="section" aria-label="輸入區">
      <div class="input-grid">
        <div class="field">
          <label for="target">目標值</label>
          <input
            id="target"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            value="0"
            aria-describedby="input-message"
          />
        </div>
        <div class="field">
          <label for="current">當前值</label>
          <input
            id="current"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            value="0"
            aria-describedby="input-message"
          />
        </div>
      </div>
      <p id="input-message" class="message" role="alert" aria-live="polite"></p>
    </section>

    <section class="section" aria-label="計算結果">
      <p class="section-title">計算結果</p>
      <div class="results-card">
        <div class="result-row">
          <span class="result-label">計算值（原始）</span>
          <span id="calc-original" class="result-value">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">計算值（0.5 倍）</span>
          <span id="calc-0-5" class="result-value">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">計算值（0.34 倍）</span>
          <span id="calc-0-34" class="result-value">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">計算值（1.5 倍）</span>
          <span id="calc-1-5" class="result-value">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">計算值（2 倍）</span>
          <span id="calc-2" class="result-value">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">計算值（3 倍）</span>
          <span id="calc-3" class="result-value">0</span>
        </div>
      </div>
    </section>

    <button type="button" id="btn-save" class="btn-save">保存記錄</button>

    <section class="section" aria-label="歷史記錄">
      <p class="section-title">歷史記錄</p>
      <div id="history" class="history-panel">暫無歷史記錄</div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">保存成功</div>

  <script>
    const STORAGE_KEYS = {
      target: "target_value",
      current: "current_value",
      original: "calculated_value",
      half: "calc_0_5x",
      third: "calc_0_34x",
      oneHalf: "calc_1_5x",
      double: "calc_2x",
      triple: "calc_3x",
      saved: "record_saved",
    };

    const INTEGER_PATTERN = /^-?\d+$/;

    const els = {
      target: document.getElementById("target"),
      current: document.getElementById("current"),
      message: document.getElementById("input-message"),
      original: document.getElementById("calc-original"),
      half: document.getElementById("calc-0-5"),
      third: document.getElementById("calc-0-34"),
      oneHalf: document.getElementById("calc-1-5"),
      double: document.getElementById("calc-2"),
      triple: document.getElementById("calc-3"),
      save: document.getElementById("btn-save"),
      history: document.getElementById("history"),
      toast: document.getElementById("toast"),
    };

    let toastTimer = null;

    function isValidIntegerString(value) {
      return value === "" || INTEGER_PATTERN.test(value);
    }

    function parseIntegerOrZero(value) {
      if (value === "") return 0;
      return parseInt(value, 10);
    }

    function intDivTowardZero(a, b) {
      return Math.trunc(a / b);
    }

    function truncMultiply(value, factor) {
      return Math.trunc(value * factor);
    }

    function computeResults(target, current) {
      const original = intDivTowardZero(target - current, 10);
      return {
        original,
        half: truncMultiply(original, 0.5),
        third: truncMultiply(original, 0.34),
        oneHalf: truncMultiply(original, 1.5),
        double: original * 2,
        triple: original * 3,
      };
    }

    function displayResults(results) {
      els.original.textContent = String(results.original);
      els.half.textContent = String(results.half);
      els.third.textContent = String(results.third);
      els.oneHalf.textContent = String(results.oneHalf);
      els.double.textContent = String(results.double);
      els.triple.textContent = String(results.triple);
    }

    function setInputValidity(valid) {
      els.target.classList.toggle("invalid", !valid);
      els.current.classList.toggle("invalid", !valid);
    }

    function showInputMessage(text) {
      els.message.textContent = text;
    }

    function updateCalculations() {
      const targetStr = els.target.value.trim();
      const currentStr = els.current.value.trim();

      const targetValid = isValidIntegerString(targetStr);
      const currentValid = isValidIntegerString(currentStr);

      if (!targetValid || !currentValid) {
        setInputValidity(false);
        showInputMessage("請輸入有效的整數");
        displayResults({
          original: 0,
          half: 0,
          third: 0,
          oneHalf: 0,
          double: 0,
          triple: 0,
        });
        return;
      }

      setInputValidity(true);
      showInputMessage("");

      const target = parseIntegerOrZero(targetStr);
      const current = parseIntegerOrZero(currentStr);
      displayResults(computeResults(target, current));
    }

    function buildHistoryHtml(target, current, results) {
      return (
        '<span class="history-title">上次保存的記錄：</span>\n' +
        `目標值=${target}，當前值=${current}\n` +
        `原始計算值=${results.original}\n` +
        `0.5倍=${results.half} | 0.34倍=${results.third} | 1.5倍=${results.oneHalf} | 2倍=${results.double} | 3倍=${results.triple}`
      );
    }

    function renderHistory() {
      if (localStorage.getItem(STORAGE_KEYS.saved) !== "1") {
        els.history.textContent = "暫無歷史記錄";
        els.history.classList.remove("has-record");
        return;
      }

      const target = localStorage.getItem(STORAGE_KEYS.target) ?? "0";
      const current = localStorage.getItem(STORAGE_KEYS.current) ?? "0";
      const results = {
        original: Number(localStorage.getItem(STORAGE_KEYS.original) ?? 0),
        half: Number(localStorage.getItem(STORAGE_KEYS.half) ?? 0),
        third: Number(localStorage.getItem(STORAGE_KEYS.third) ?? 0),
        oneHalf: Number(localStorage.getItem(STORAGE_KEYS.oneHalf) ?? 0),
        double: Number(localStorage.getItem(STORAGE_KEYS.double) ?? 0),
        triple: Number(localStorage.getItem(STORAGE_KEYS.triple) ?? 0),
      };

      els.history.innerHTML = buildHistoryHtml(target, current, results);
      els.history.classList.add("has-record");
    }

    function persistToStorage(targetStr, currentStr, results) {
      localStorage.setItem(STORAGE_KEYS.target, targetStr);
      localStorage.setItem(STORAGE_KEYS.current, currentStr);
      localStorage.setItem(STORAGE_KEYS.original, String(results.original));
      localStorage.setItem(STORAGE_KEYS.half, String(results.half));
      localStorage.setItem(STORAGE_KEYS.third, String(results.third));
      localStorage.setItem(STORAGE_KEYS.oneHalf, String(results.oneHalf));
      localStorage.setItem(STORAGE_KEYS.double, String(results.double));
      localStorage.setItem(STORAGE_KEYS.triple, String(results.triple));
      localStorage.setItem(STORAGE_KEYS.saved, "1");
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        els.toast.classList.remove("show");
      }, 1500);
    }

    function handleSave() {
      const targetStr = els.target.value.trim();
      const currentStr = els.current.value.trim();

      if (targetStr === "") {
        showInputMessage("目標值不能為空");
        els.target.classList.add("invalid");
        els.target.focus();
        return;
      }

      if (currentStr === "") {
        showInputMessage("當前值不能為空");
        els.current.classList.add("invalid");
        els.current.focus();
        return;
      }

      if (!INTEGER_PATTERN.test(targetStr) || !INTEGER_PATTERN.test(currentStr)) {
        showInputMessage("請輸入有效的整數");
        setInputValidity(false);
        return;
      }

      const target = parseInt(targetStr, 10);
      const current = parseInt(currentStr, 10);
      const results = computeResults(target, current);

      persistToStorage(targetStr, currentStr, results);
      renderHistory();
      showToast("保存成功");
      setInputValidity(true);
      showInputMessage("");
    }

    function loadFromStorage() {
      const hasSaved = localStorage.getItem(STORAGE_KEYS.saved) === "1";

      if (hasSaved) {
        els.target.value = localStorage.getItem(STORAGE_KEYS.target) ?? "0";
        els.current.value = localStorage.getItem(STORAGE_KEYS.current) ?? "0";
      }

      updateCalculations();
      renderHistory();
    }

    els.target.addEventListener("input", updateCalculations);
    els.current.addEventListener("input", updateCalculations);
    els.save.addEventListener("click", handleSave);

    loadFromStorage();
  </script>
</body>
</html>
